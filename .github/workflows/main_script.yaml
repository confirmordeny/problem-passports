name: Filter Organisations
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-and-extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Inline Python Script
        shell: python
        run: |
          import csv
          import os
          import sys

          # Define paths relative to the repo root
          repo_root = os.getcwd()
          input_path = os.path.join(repo_root, "data", "problem_passports_dataset.csv")
          output_dir = os.path.join(repo_root, "dist")
          output_file = os.path.join(output_dir, "ORGANISATIONS_LINKED_TO_PROBLEM_PASSPORTS.md")

          # --- DEBUGGING: Check if file exists ---
          if not os.path.exists(input_path):
              print(f"ERROR: Source file NOT found at: {input_path}")
              print(f"Current Directory: {repo_root}")
              print(f"Contents of Root: {os.listdir(repo_root)}")
              if os.path.exists(os.path.join(repo_root, "data")):
                  print(f"Contents of 'data' folder: {os.listdir(os.path.join(repo_root, 'data'))}")
              sys.exit(1)

          # Ensure output directory exists
          if not os.path.exists(output_dir):
              os.makedirs(output_dir)

          organisations = []
          
          # Process CSV
          with open(input_path, mode='r', encoding='utf-8') as f:
              # Use DictReader to handle column names automatically
              reader = csv.DictReader(f)
              fieldnames = reader.fieldnames
              
              target_column = "Etymology classification by Repo"
              
              if target_column not in fieldnames:
                  print(f"ERROR: Column '{target_column}' not found in CSV.")
                  print(f"Available columns: {fieldnames}")
                  sys.exit(1)

              for row in reader:
                  if row.get(target_column) == "Organisation":
                      organisations.append(row)

          # Write Markdown Output
          with open(output_file, mode='w', encoding='utf-8') as f:
              # Invisible Code Warning
              f.write("<!-- WARNING: DO NOT EDIT THIS FILE DIRECTLY. IT IS AUTO-GENERATED BY .github/workflows/main_script.yaml -->\n\n")
              
              # Visible Header and Note with Hyperlink
              f.write("# Organisations linked to problem passports\n\n")
              f.write("> **Note:** This listing is based on an extract of the EU's [List of known fantasy and camouflage passports](https://home-affairs.ec.europa.eu/list-known-fantasy-and-camouflage-passports_en) (October
