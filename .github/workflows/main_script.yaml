name: Filter Organisations
on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process-and-extract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Inline Python Script
        shell: python
        run: |
          import csv
          import os
          import sys

          # Define paths relative to the repo root
          repo_root = os.getcwd()
          input_path = os.path.join(repo_root, "data", "problem_passports_dataset.csv")
          output_dir = os.path.join(repo_root, "dist")
          output_file = os.path.join(output_dir, "ORGANISATIONS_LINKED_TO_PROBLEM_PASSPORTS.md")

          if not os.path.exists(input_path):
              print(f"ERROR: Source file NOT found at: {input_path}")
              sys.exit(1)

          if not os.path.exists(output_dir):
              os.makedirs(output_dir)

          organisations = []
          
          with open(input_path, mode='r', encoding='utf-8') as f:
              reader = csv.DictReader(f)
              # Convert fieldnames to a list so we can reorder them
              fieldnames = list(reader.fieldnames)
              
              target_column = "Etymology classification by Repo"
              first_column = "Organisation/document name"

              # Reorder columns: Move 'Organisation/document name' to index 0
              if first_column in fieldnames:
                  fieldnames.remove(first_column)
                  fieldnames.insert(0, first_column)
              
              if target_column not in fieldnames:
                  print(f"ERROR: Column '{target_column}' not found.")
                  sys.exit(1)

              for row in reader:
                  if row.get(target_column) == "Organisation":
                      organisations.append(row)

          with open(output_file, mode='w', encoding='utf-8') as f:
              f.write("\n\n")
              f.write("# Organisations linked to problem passports\n\n")
              
              # Using triple quotes for safe string literal handling
              note_text = """> **Note:** This listing is based on an extract of the EU's [List of known fantasy and camouflage passports](https://home-affairs.ec.europa.eu/list-known-fantasy-and-camouflage-passports_en) (October 2025).\n\n"""
              f.write(note_text)
              
              if not organisations:
                  f.write("_No records found with classification 'Organisation'._")
              else:
                  # Table Headers (using the new fieldnames order)
                  f.write("| " + " | ".join(fieldnames) + " |\n")
                  f.write("| " + " | ".join(["---"] * len(fieldnames)) + " |\n")
                  
                  # Table Rows
                  for org in organisations:
                      # We pull values based on the reordered fieldnames list
                      safe_values = [str(org.get(col, "")).replace("|", "\\|") for col in fieldnames]
                      f.write("| " + " | ".join(safe_values) + " |\
